<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <!-- Background Circles -->
  <circle cx="250" cy="200" r="140" fill="#e6f0ff" opacity="0.4"/>
  <circle cx="280" cy="180" r="100" fill="#1677ff" opacity="0.1"/>
  
  <!-- Email Envelope -->
  <g transform="translate(150, 140)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="#ffffff" stroke="#1677ff" stroke-width="2"/>
    <path d="M 0 0 L 100 70 L 200 0" fill="#1677ff" opacity="0.8"/>
    <path d="M 0 0 L 100 70 L 200 0" fill="none" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Key Icon on envelope -->
    <g transform="translate(85, 80)">
      <circle cx="0" cy="0" r="12" fill="#1677ff"/>
      <rect x="0" y="-3" width="25" height="6" fill="#1677ff"/>
      <rect x="18" y="-6" width="3" height="6" fill="#1677ff"/>
      <rect x="22" y="-6" width="3" height="6" fill="#1677ff"/>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="80" cy="90" r="10" fill="#1677ff" opacity="0.2"/>
  <circle cx="420" cy="110" r="15" fill="#1677ff" opacity="0.15"/>
  <circle cx="90" cy="320" r="12" fill="#1677ff" opacity="0.2"/>
  <circle cx="410" cy="300" r="8" fill="#1677ff" opacity="0.25"/>
  
  <!-- Checkmark circle -->
  <circle cx="350" cy="100" r="20" fill="#52c41a" opacity="0.9"/>
  <path d="M 343 100 L 348 105 L 357 95" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
