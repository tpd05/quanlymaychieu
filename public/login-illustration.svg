<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <!-- Background Circle -->
  <circle cx="250" cy="200" r="150" fill="#e6f0ff" opacity="0.5"/>
  
  <!-- Monitor/Screen -->
  <rect x="150" y="120" width="200" height="140" rx="8" fill="#1677ff" opacity="0.9"/>
  <rect x="160" y="130" width="180" height="110" rx="4" fill="#ffffff"/>
  
  <!-- Lock Icon -->
  <g transform="translate(220, 160)">
    <rect x="0" y="15" width="30" height="35" rx="4" fill="#1677ff" opacity="0.2"/>
    <path d="M 8 15 Q 8 5, 15 5 Q 22 5, 22 15" stroke="#1677ff" stroke-width="3" fill="none"/>
    <circle cx="15" cy="30" r="4" fill="#1677ff"/>
    <line x1="15" y1="34" x2="15" y2="42" stroke="#1677ff" stroke-width="2"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="80" r="8" fill="#1677ff" opacity="0.3"/>
  <circle cx="380" cy="100" r="12" fill="#1677ff" opacity="0.2"/>
  <circle cx="420" cy="280" r="10" fill="#1677ff" opacity="0.25"/>
  
  <!-- Text lines simulation -->
  <rect x="180" y="210" width="120" height="4" rx="2" fill="#e6f0ff"/>
  <rect x="180" y="220" width="100" height="4" rx="2" fill="#e6f0ff"/>
</svg>
